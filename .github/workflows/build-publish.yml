name: Build and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha: ${{ steps.version.outputs.sha }}
      build_date: ${{ steps.version.outputs.build_date }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build pytest

    - name: Run tests
      run: |
        pip install -e .
        python -m pytest tests/ -v

    - name: Build package
      run: python -m build

    - name: Get version info
      id: version
      run: |
        VERSION=$(python -c "import laziest_import; print(laziest_import.__version__)")
        SHA=$(git rev-parse --short HEAD)
        BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "sha=$SHA" >> $GITHUB_OUTPUT
        echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: laziest-import ${{ needs.build.outputs.version }}
        body: |
          ## Release Information
          
          | Property | Value |
          |----------|-------|
          | **Version** | ${{ needs.build.outputs.version }} |
          | **Commit SHA** | ${{ needs.build.outputs.sha }} |
          | **Build Date** | ${{ needs.build.outputs.build_date }} |
          | **Python** | 3.8+ |
          
          ### Installation
          ```
          pip install laziest-import
          ```
          
          ### Files
          - Wheel and source distribution included in assets
        files: dist/*
        draft: false
        prerelease: ${{ contains(needs.build.outputs.version, '-pre') || contains(needs.build.outputs.version, '-alpha') || contains(needs.build.outputs.version, '-beta') }}

  publish:
    needs: [build, release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
