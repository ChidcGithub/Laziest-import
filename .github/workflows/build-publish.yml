name: Build and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha: ${{ steps.version.outputs.sha }}
      build_date: ${{ steps.version.outputs.build_date }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build pytest pytest-asyncio

    - name: Run tests
      run: |
        pip install -e .[dev]
        python -m pytest tests/ -v

    - name: Build package
      run: python -m build

    - name: Get version info
      id: version
      run: |
        python << 'PYEOF'
        import os
        import subprocess
        from datetime import datetime, timezone
        
        import laziest_import
        
        version = laziest_import.__version__
        sha = subprocess.check_output(['git', 'rev-parse', '--short', 'HEAD']).decode().strip()
        build_date = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC")
        
        is_prerelease = any(x in version for x in ['-pre', '-alpha', '-beta', '-rc'])
        
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"version={version}\n")
            f.write(f"sha={sha}\n")
            f.write(f"build_date={build_date}\n")
            f.write(f"is_prerelease={'true' if is_prerelease else 'false'}\n")
        
        print(f"Version: {version}")
        print(f"Is prerelease: {is_prerelease}")
        PYEOF

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Create Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        python << 'PYEOF'
        import os
        import subprocess
        import re
        
        version = "${{ needs.build.outputs.version }}"
        sha = "${{ needs.build.outputs.sha }}"
        build_date = "${{ needs.build.outputs.build_date }}"
        is_prerelease = "${{ needs.build.outputs.is_prerelease }}" == "true"
        tag_name = os.environ.get('GITHUB_REF_NAME', f'v{version}')
        
        def run_git(*args):
            result = subprocess.run(['git'] + list(args), capture_output=True, text=True)
            return result.stdout.strip()
        
        def get_commits(since_tag=None, limit=30):
            if since_tag:
                cmd = ['log', since_tag + '..HEAD', '--pretty=format:%s [%h]', '--no-merges']
                result = subprocess.run(['git'] + cmd, capture_output=True, text=True)
                if result.returncode == 0 and result.stdout.strip():
                    return result.stdout.strip().split('\n')
            cmd = ['log', '--pretty=format:%s [%h]', '--no-merges', f'-{limit}']
            result = subprocess.run(['git'] + cmd, capture_output=True, text=True)
            if result.returncode == 0 and result.stdout.strip():
                return result.stdout.strip().split('\n')
            return []
        
        def categorize_commits(commits):
            features, fixes, refactor, tests, docs, other = [], [], [], [], [], []
            for c in commits:
                cl = c.lower()
                if any(x in cl for x in ['feat', 'feature', 'add', 'new']):
                    features.append(c)
                elif any(x in cl for x in ['fix', 'bug', 'patch', 'resolve']):
                    fixes.append(c)
                elif any(x in cl for x in ['refactor', 'restructure', 'clean', 'improve']):
                    refactor.append(c)
                elif any(x in cl for x in ['test', 'pytest', 'coverage']):
                    tests.append(c)
                elif any(x in cl for x in ['doc', 'readme', 'comment']):
                    docs.append(c)
                else:
                    other.append(c)
            return features, fixes, refactor, tests, docs, other
        
        def format_section(title, commits):
            if not commits:
                return ""
            lines = [f"\n### {title}"]
            for c in commits:
                lines.append(f"- {c}")
            return "\n".join(lines)
        
        # Generate release notes
        if is_prerelease:
            release_notes = """## Pre-release

This is a pre-release version for testing purposes."""
        else:
            # Get last stable tag
            tags = run_git('tag', '--list', 'v*').split('\n')
            stable_tags = [t for t in tags if t and not re.search(r'(pre|alpha|beta|rc)', t)]
            last_stable = stable_tags[-1] if stable_tags else None
            
            if last_stable and last_stable != tag_name:
                print(f"Last stable tag: {last_stable}")
                commits = get_commits(last_stable)
            else:
                print("No previous stable tag found, using recent commits")
                commits = get_commits()
            
            features, fixes, refactor, tests, docs, other = categorize_commits(commits)
            
            sections = []
            sections.append(format_section("New Features", features))
            sections.append(format_section("Bug Fixes", fixes))
            sections.append(format_section("Refactoring", refactor))
            sections.append(format_section("Tests", tests))
            sections.append(format_section("Documentation", docs))
            sections.append(format_section("Other Changes", other))
            
            release_notes = "\n".join(s for s in sections if s)
            
            # Add full changelog
            if commits:
                release_notes += "\n\n---\n\n### Full Changelog\n```\n"
                for c in commits:
                    release_notes += f"- {c}\n"
                release_notes += "```"
        
        # Build release body
        body = f"""## Release Information

| Property | Value |
|----------|-------|
| **Version** | {version} |
| **Commit SHA** | {sha} |
| **Build Date** | {build_date} |
| **Python** | 3.8+ |

### Installation
```
pip install laziest-import
```

{release_notes}

---

### Files
Wheel and source distribution included in assets."""
        
        # Write body to file for gh command
        with open('/tmp/release_body.md', 'w') as f:
            f.write(body)
        
        # Create release using gh CLI
        cmd = [
            'gh', 'release', 'create', tag_name,
            '--title', f'laziest-import {version}',
            '--notes-file', '/tmp/release_body.md',
        ]
        if is_prerelease:
            cmd.append('--prerelease')
        
        # Add files
        for f in os.listdir('dist'):
            cmd.append(f'dist/{f}')
        
        subprocess.run(cmd, check=True)
        print(f"Release {tag_name} created successfully!")
        PYEOF

  publish:
    needs: [build, release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1